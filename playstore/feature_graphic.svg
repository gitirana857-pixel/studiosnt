<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="500" viewBox="0 0 1024 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c64d53"/>
      <stop offset="100%" style="stop-color:#8a3a3f"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="500" fill="url(#bg)"/>
  
  <!-- Abstract shapes -->
  <circle cx="850" cy="100" r="150" fill="url(#grad2)"/>
  <circle cx="900" cy="400" r="200" fill="url(#grad2)"/>
  <circle cx="100" cy="250" r="120" fill="url(#grad2)"/>

  <!-- Large play button -->
  <polygon points="380,120 380,380 680,250" fill="white" opacity="0.9"/>
  
  <!-- App name -->
  <text x="512" y="440" font-family="Arial,sans-serif" font-weight="bold" font-size="64" fill="white" text-anchor="middle">STUDIOS NT</text>
  
  <!-- Tagline -->
  <text x="512" y="480" font-family="Arial,sans-serif" font-weight="normal" font-size="24" fill="white" text-anchor="middle" opacity="0.8">Rede Social</text>
</svg>
