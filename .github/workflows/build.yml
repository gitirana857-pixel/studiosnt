name: Build Xamarin.Android APK (Debug)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'microsoft'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 34
        build-tools-version: 34.0.0
        cmdline-tools-version: latest

    - name: Accept Android SDK licenses
      run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

    - name: Setup .NET 8 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Install .NET Android workload
      run: |
        dotnet workload install android
        dotnet --list-sdks

    - name: Build Debug APK
      run: |
        cd WoWonder
        set -o pipefail
        dotnet build WoWonder.csproj -c Debug -f net8.0-android \
          -p:AndroidPackageFormat=apk \
          -p:AndroidKeyStore=false \
          2>&1 | tee build.log
        echo "Build exit code: $?"
      continue-on-error: true

    - name: Check build result
      run: |
        echo "=== Last 30 lines of build log ===" >> $GITHUB_STEP_SUMMARY
        tail -30 WoWonder/build.log >> $GITHUB_STEP_SUMMARY
        echo "=== Build output files ===" >> $GITHUB_STEP_SUMMARY
        find WoWonder/bin -type f 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No bin output"
      continue-on-error: true

    - name: Find APK
      id: find_apk
      run: |
        echo "=== Looking for APK files ==="
        APK_PATH=$(find WoWonder -type f -name "*.apk" 2>/dev/null | head -5)
        if [ -n "$APK_PATH" ]; then
          FIRST_APK=$(echo "$APK_PATH" | head -1)
          echo "apk_path=$FIRST_APK" >> $GITHUB_OUTPUT
          echo "Found APK: $FIRST_APK"
        else
          echo "No APK files found!"
          echo "=== Checking bin ==="
          find WoWonder/bin -type f 2>/dev/null | head -30
          echo "=== Checking obj ==="
          find WoWonder/obj -type f -name "*.apk" -o -name "*.aab" 2>/dev/null | head -10
          echo "=== Checking all output dirs ==="
          find WoWonder -type d -name "net8.0-android" 2>/dev/null | head -5
          echo "apk_path=" >> $GITHUB_OUTPUT
        fi

    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: WoWonder/build.log
        retention-days: 7

    - name: Upload Debug APK
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: timeline-debug-apk
        path: WoWonder/**/*.apk
        retention-days: 30
      continue-on-error: true