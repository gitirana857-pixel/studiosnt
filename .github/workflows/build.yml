name: Build APK (Debug)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/dotnet/sdk:8.0
    timeout-minutes: 60

    steps:
    - uses: actions/checkout@v4

    - name: Install Java & Android SDK
      run: |
        apt-get update -qq
        apt-get install -y -qq openjdk-17-jdk wget unzip

    - name: Install Android workload
      run: |
        dotnet workload install android
        echo "dotnet --version: $(dotnet --version)"
        echo "dotnet --list-sdks:"
        dotnet --list-sdks

    - name: Build & Publish APK
      run: |
        cd WoWonder
        dotnet restore WoWonder.csproj
        dotnet publish WoWonder.csproj \
          -c Debug \
          -f net8.0-android \
          -r android-arm64 \
          --self-contained \
          -p:AndroidPackageFormat=apk \
          -p:AndroidKeyStore=false \
          -p:DebugType=none \
          -p:DebugSymbols=false \
          2>&1 | tee build.log
        exit_code=${PIPESTATUS[0]}
        echo "PUBLISH_EXIT_CODE=$exit_code"
        if [ $exit_code -ne 0 ]; then
          # Try with NU1202 suppression
          echo "=== Retrying with NU1202 suppression ==="
          dotnet publish WoWonder.csproj \
            -c Debug \
            -f net8.0-android \
            -r android-arm64 \
            --self-contained \
            -p:AndroidPackageFormat=apk \
            -p:AndroidKeyStore=false \
            -p:DebugType=none \
            -p:DebugSymbols=false \
            -p:NoWarn=NU1202 \
            -p:CheckEolTargetFramework=false \
            2>&1 | tee -a build.log
          exit ${PIPESTATUS[0]}
        fi

    - name: Verify APK
      run: |
        echo "=== APK files ==="
        find . -name "*.apk" -type f 2>/dev/null | head -20
        echo "=== Bin dir ==="
        find WoWonder/bin -type d 2>/dev/null | head -20

    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: WoWonder/build.log
        retention-days: 7
        if-no-files-found: ignore

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: timeline-apk
        path: |
          WoWonder/bin/Debug/net8.0-android/**/*.apk
          WoWonder/**/com.wowondertimeline*.apk
          WoWonder/**/*-Signed.apk
          WoWonder/**/*-unsigned.apk
        retention-days: 30
        if-no-files-found: warn
