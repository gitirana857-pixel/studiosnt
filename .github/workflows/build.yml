name: Build APK (Debug)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
    - uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'microsoft'
        java-version: '17'

    - name: Setup .NET 8 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Check installed SDKs
      run: |
        echo "=== SDKs available ==="
        dotnet --list-sdks
        echo "=== dotnet --version ==="
        dotnet --version
        echo "=== DOTNET_ROOT ==="
        echo "$DOTNET_ROOT"
        echo "=== dotnet --info ==="
        dotnet --info | head -10

    - name: Install Android workload
      run: |
        # global.json pins to SDK 8.0.x, so workload will install for .NET 8
        dotnet workload install android --skip-manifest-update

    - name: Build & Publish APK
      run: |
        cd WoWonder
        echo "=== dotnet --version used ==="
        dotnet --version
        dotnet restore WoWonder.csproj -p:CheckEolTargetFramework=false -p:NoWarn=NU1202
        dotnet publish WoWonder.csproj \
          -c Debug \
          -f net8.0-android \
          -r android-arm64 \
          --self-contained \
          -p:AndroidPackageFormat=apk \
          -p:AndroidKeyStore=false \
          -p:DebugType=none \
          -p:DebugSymbols=false \
          -p:CheckEolTargetFramework=false \
          -p:NoWarn=NU1202 \
          2>&1 | tee build.log
        exit_code=${PIPESTATUS[0]}
        echo "PUBLISH_EXIT_CODE=$exit_code"
        exit $exit_code

    - name: Verify APK was created
      run: |
        echo "=== Searching for APK files ==="
        find . -name "*.apk" -type f 2>/dev/null | head -20 || echo "No APK found"
        echo "=== Checking bin directory structure ==="
        find WoWonder/bin -type d 2>/dev/null | head -30 || echo "No bin dir"

    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: WoWonder/build.log
        retention-days: 7

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: timeline-apk
        path: |
          WoWonder/bin/Debug/net8.0-android/**/*.apk
          WoWonder/**/com.wowondertimeline*.apk
          WoWonder/**/*-Signed.apk
          WoWonder/**/*-unsigned.apk
        retention-days: 30
        if-no-files-found: warn
