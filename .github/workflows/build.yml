name: Build APK (Debug)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
    - uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'microsoft'
        java-version: '17'

    - name: Setup .NET 8 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Find .NET 8 SDK and install Android workload
      run: |
        # setup-dotnet installs into $RUNNER_TOOL_CACHE or adds to PATH
        # Find the real .NET 8 SDK path
        DOTNET8_PATH=$(readlink -f $(which dotnet))
        echo "dotnet from PATH: $DOTNET8_PATH"
        echo "dotnet --version: $(dotnet --version)"
        
        # If it's SDK 10, find the 8.0 one
        if dotnet --version | grep -q '^10'; then
          echo "SDK 10 found in PATH, searching for .NET 8..."
          # setup-dotnet usually installs to /usr/share/dotnet or under /home/runner/.dotnet
          # Look for the 8.0 SDK
          SDK_DIRS=$(find / -name "dotnet" -type f -executable 2>/dev/null | head -10)
          echo "All dotnet binaries:"
          for d in $SDK_DIRS; do
            echo "  $d -> $($d --version 2>/dev/null)"
          done
        fi
        DOTNET8_PATH=$(find / -name "dotnet" -type f -executable 2>/dev/null | while read f; do v=$($f --version 2>/dev/null); if echo "$v" | grep -q '^8\.'; then echo "$f"; fi; done | head -1)
        echo "FOUND DOTNET 8: $DOTNET8_PATH"
        echo "DOTNET8_BIN=$DOTNET8_PATH" >> $GITHUB_ENV
        
        if [ -n "$DOTNET8_PATH" ]; then
          # Set DOTNET_ROOT to the .NET 8 SDK root
          DOTNET8_DIR=$(dirname "$DOTNET8_PATH")
          echo "DOTNET_ROOT=$DOTNET8_DIR" >> $GITHUB_ENV
          # Add to PATH ahead of everything
          echo "$DOTNET8_DIR" >> $GITHUB_PATH
          export PATH="$DOTNET8_DIR:$PATH"
          $DOTNET8_PATH --info | head -10
          $DOTNET8_PATH workload install android
        else
          echo "ERROR: Could not find .NET 8 SDK!" >&2
          exit 1
        fi

    - name: Publish APK
      run: |
        dotnet --info | head -3
        cd WoWonder
        dotnet publish WoWonder.csproj \
          -c Debug \
          -f net8.0-android \
          -r android-arm64 \
          -p:AndroidPackageFormat=apk \
          -p:AndroidKeyStore=false \
          -p:DebugType=none \
          -p:DebugSymbols=false \
          -p:CheckEolTargetFramework=false \
          -p:NoWarn=NU1202 \
          -p:AllowedReferenceRelatedFileExtensions=none \
          2>&1 | tee build.log
        exit_code=${PIPESTATUS[0]}
        echo "PUBLISH_EXIT_CODE=$exit_code"
        exit $exit_code

    - name: Verify APK was created
      run: |
        echo "=== Searching for APK files ==="
        find . -name "*.apk" -type f 2>/dev/null | head -20 || echo "No APK found"
        echo "=== Checking bin directory structure ==="
        find WoWonder/bin -type d 2>/dev/null | head -30 || echo "No bin dir"

    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: WoWonder/build.log
        retention-days: 7

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: timeline-apk
        path: |
          WoWonder/bin/Debug/net8.0-android/**/*.apk
          WoWonder/**/com.wowondertimeline*.apk
          WoWonder/**/*-Signed.apk
          WoWonder/**/*-unsigned.apk
        retention-days: 30
        if-no-files-found: warn
