name: Build APK (Debug)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
    - uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'microsoft'
        java-version: '17'

    - name: Setup .NET 8 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Install Android workload
      run: |
        dotnet workload install android
        echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"

    - name: Restore NuGet packages (android-arm64 only)
      run: |
        cd WoWonder
        dotnet restore WoWonder.csproj \
          --runtime android-arm64 \
          -p:CheckEolTargetFramework=false

    - name: Publish APK
      run: |
        cd WoWonder
        dotnet publish WoWonder.csproj -c Debug \
          -f net8.0-android34.0 \
          -r android-arm64 \
          -p:AndroidPackageFormat=apk \
          -p:AndroidKeyStore=false \
          -p:DebugType=none \
          -p:DebugSymbols=false \
          -p:CheckEolTargetFramework=false \
          2>&1 | tee build.log
        exit_code=${PIPESTATUS[0]}
        echo "PUBLISH_EXIT_CODE=$exit_code"
        exit $exit_code

    - name: Verify APK was created
      run: |
        echo "=== Searching for APK files ==="
        find . -name "*.apk" -type f 2>/dev/null | head -20 || echo "No APK found"
        echo "=== Checking bin directory structure ==="
        find WoWonder/bin -type d 2>/dev/null | head -30 || echo "No bin dir"

    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: WoWonder/build.log
        retention-days: 7

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: timeline-apk
        path: |
          WoWonder/bin/Debug/net8.0-android34.0/**/*.apk
          WoWonder/**/com.wowondertimeline*.apk
          WoWonder/**/*-Signed.apk
          WoWonder/**/*-unsigned.apk
        retention-days: 30
        if-no-files-found: warn
