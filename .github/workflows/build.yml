name: Build Xamarin.Android APK (Debug)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'microsoft'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 34
        build-tools-version: 34.0.0
        cmdline-tools-version: latest

    - name: Accept Android SDK licenses
      run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

    - name: Setup .NET 8 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Install .NET Android workload
      run: |
        dotnet workload install android
        dotnet --list-sdks

    - name: Restore NuGet packages
      run: |
        cd WoWonder
        dotnet restore WoWonder.csproj

    - name: Build Debug APK
      run: |
        cd WoWonder
        dotnet build WoWonder.csproj -c Debug -f net8.0-android

    - name: Find APK
      id: find_apk
      run: |
        APK_PATH=$(find WoWonder -name "*.apk" -type f | grep -i debug | head -1)
        if [ -z "$APK_PATH" ]; then
          APK_PATH=$(find WoWonder -name "*.apk" -type f | head -1)
        fi
        if [ -z "$APK_PATH" ]; then
          echo "No APK found!"
          exit 1
        fi
        echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
        echo "Found APK: $APK_PATH"

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: timeline-debug-apk
        path: ${{ steps.find_apk.outputs.apk_path }}
        retention-days: 30