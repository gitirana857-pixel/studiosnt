name: Build APK (Debug)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'microsoft'
        java-version: '17'

    - name: Install standalone .NET 8 SDK
      run: |
        # Download .NET 8 SDK from official source
        wget -q https://dotnetcli.azureedge.net/dotnet/Sdk/8.0.422/dotnet-sdk-8.0.422-linux-x64.tar.gz -O /tmp/dotnet8.tar.gz
        mkdir -p /opt/dotnet8
        tar -xzf /tmp/dotnet8.tar.gz -C /opt/dotnet8
        echo "SDK 8 installed at /opt/dotnet8"
        /opt/dotnet8/dotnet --version
        /opt/dotnet8/dotnet --list-sdks

    - name: Install Android workload for .NET 8
      run: |
        export DOTNET_ROOT=/opt/dotnet8
        export PATH=/opt/dotnet8:$PATH
        $DOTNET_ROOT/dotnet workload install android
        echo "DOTNET_ROOT=/opt/dotnet8" >> $GITHUB_ENV
        echo "/opt/dotnet8" >> $GITHUB_PATH

    - name: Build & Publish APK
      run: |
        export DOTNET_ROOT=/opt/dotnet8
        export PATH=/opt/dotnet8:$PATH
        echo "Using dotnet: $(which dotnet) -> $(dotnet --version)"
        cd WoWonder
        dotnet restore WoWonder.csproj
        dotnet publish WoWonder.csproj \
          -c Debug \
          -f net8.0-android \
          -r android-arm64 \
          --self-contained \
          -p:AndroidPackageFormat=apk \
          -p:AndroidKeyStore=false \
          -p:DebugType=none \
          -p:DebugSymbols=false \
          2>&1 | tee build.log
        exit_code=${PIPESTATUS[0]}
        echo "PUBLISH_EXIT_CODE=$exit_code"
        # If NU1202 errors, retry with suppression
        if [ $exit_code -ne 0 ]; then
          echo "=== Retrying with NU1202 suppression ==="
          dotnet publish WoWonder.csproj \
            -c Debug \
            -f net8.0-android \
            -r android-arm64 \
            --self-contained \
            -p:AndroidPackageFormat=apk \
            -p:AndroidKeyStore=false \
            -p:DebugType=none \
            -p:DebugSymbols=false \
            -p:NoWarn=NU1202 \
            -p:CheckEolTargetFramework=false \
            2>&1 | tee -a build.log
          exit ${PIPESTATUS[0]}
        fi
        exit $exit_code

    - name: Verify APK
      run: |
        find . -name "*.apk" -type f 2>/dev/null | head -20
        find WoWonder/bin -type d 2>/dev/null | head -20

    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: WoWonder/build.log
        retention-days: 7
        if-no-files-found: ignore

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: timeline-apk
        path: |
          WoWonder/bin/Debug/net8.0-android/**/*.apk
          WoWonder/**/com.wowondertimeline*.apk
        retention-days: 30
        if-no-files-found: warn

    - name: Upload to GitHub Release
      if: success()
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        # Find the signed APK
        APK_FILE=$(find WoWonder -name "*Signed*" -o -name "*signed*" -o -name "*.apk" | grep -i "com.wowonder" | head -1)
        if [ -z "$APK_FILE" ]; then
          APK_FILE=$(find WoWonder -name "*.apk" -type f | head -1)
        fi
        APK_NAME=$(basename "$APK_FILE")
        echo "APK: $APK_FILE ($(stat -c%s "$APK_FILE") bytes)"
        
        # Get the latest commit SHA for the tag
        SHA=$(git rev-parse HEAD)
        
        # Create a tag and push it
        TAG="v$(date +%s)"
        git tag "$TAG" "$SHA"
        git push origin "$TAG" 2>&1 || true
        
        # Create release via API (in case gh doesn't work with tag)
        curl -s -X POST \
          -H "Authorization: token $GH_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          "https://api.github.com/repos/${{ github.repository }}/releases" \
          -d "{\"tag_name\":\"$TAG\",\"name\":\"Timeline APK $(date +%Y-%m-%d) #${{ github.run_number }}\",\"body\":\"Automatic build from commit $(git rev-parse --short HEAD)\"}" > /tmp/release.json
        
        # Parse upload URL
        UPLOAD_URL=$(python3 -c "import json; r=json.load(open('/tmp/release.json')); print(r.get('upload_url','').split('{')[0])")
        echo "Upload URL: $UPLOAD_URL"
        
        # Upload the asset
        curl -s -X POST \
          -H "Authorization: token $GH_TOKEN" \
          -H "Content-Type: application/vnd.android.package-archive" \
          --data-binary @"$APK_FILE" \
          "$UPLOAD_URL?name=$APK_NAME" > /tmp/upload_result.json
        
        echo "Upload result: $(python3 -c "import json; r=json.load(open('/tmp/upload_result.json')); print(r.get('state','ERROR') + ' - ' + r.get('browser_download_url',''))")
        echo "RELEASE_TAG=$TAG" >> $GITHUB_ENV
