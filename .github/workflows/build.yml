name: Build APK (Debug)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 8 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Install Android workload & dependencies
      run: |
        dotnet workload install android
        echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"

    - name: Publish APK
      run: |
        cd WoWonder
        set -x
        echo "dotnet SDK: $(dotnet --version)"
        dotnet workload list 2>&1
        dotnet publish WoWonder.csproj -c Debug -f net8.0-android \
          -r android-arm64 \
          -p:AndroidPackageFormat=apk \
          -p:AndroidKeyStore=false \
          -p:DebugType=none \
          -p:DebugSymbols=false 2>&1 | tee build.log
        echo "Build exit: $?"
      continue-on-error: true

    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: WoWonder/build.log
        retention-days: 7

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: timeline-apk
        path: WoWonder/bin/Debug/net8.0-android/android-arm64/publish/*.apk
        retention-days: 30
        if-no-files-found: warn
