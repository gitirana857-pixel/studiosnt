name: Build APK + AAB

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: true

jobs:
  # ─── Build APK (Debug, unsigned) ───
  build-apk:
    name: Build APK (Debug)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'microsoft'
        java-version: '17'

    - name: Install standalone .NET 8 SDK
      run: |
        wget -q https://dotnetcli.azureedge.net/dotnet/Sdk/8.0.422/dotnet-sdk-8.0.422-linux-x64.tar.gz -O /tmp/dotnet8.tar.gz
        mkdir -p /opt/dotnet8
        tar -xzf /tmp/dotnet8.tar.gz -C /opt/dotnet8
        echo "SDK 8 installed at /opt/dotnet8"
        /opt/dotnet8/dotnet --version
        echo "DOTNET_ROOT=/opt/dotnet8" >> $GITHUB_ENV
        echo "/opt/dotnet8" >> $GITHUB_PATH

    - name: Install Android workload for .NET 8
      run: |
        export DOTNET_ROOT=/opt/dotnet8
        export PATH=/opt/dotnet8:$PATH
        $DOTNET_ROOT/dotnet workload install android

    - name: Build & Publish APK
      run: |
        export DOTNET_ROOT=/opt/dotnet8
        export PATH=/opt/dotnet8:$PATH
        cd WoWonder
        dotnet publish WoWonder.csproj \
          -c Debug \
          -f net8.0-android \
          -r android-arm64 \
          --self-contained \
          -p:AndroidPackageFormat=apk \
          -p:AndroidKeyStore=false \
          -p:DebugType=none \
          -p:DebugSymbols=false 2>&1 | tee build.log
        exit_code=${PIPESTATUS[0]}
        if [ $exit_code -ne 0 ]; then
          echo "=== Retrying with NU1202 suppression ==="
          dotnet publish WoWonder.csproj \
            -c Debug \
            -f net8.0-android \
            -r android-arm64 \
            --self-contained \
            -p:AndroidPackageFormat=apk \
            -p:AndroidKeyStore=false \
            -p:DebugType=none \
            -p:DebugSymbols=false \
            -p:NoWarn=NU1202 \
            -p:CheckEolTargetFramework=false 2>&1 | tee -a build.log
          exit ${PIPESTATUS[0]}
        fi
        exit $exit_code

    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: WoWonder/build.log
        retention-days: 7
        if-no-files-found: ignore

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: timeline-apk
        path: |
          WoWonder/bin/Debug/net8.0-android/**/*.apk
          WoWonder/**/com.wowondertimeline*.apk
          WoWonder/**/studios_nt_pt.apk
        retention-days: 30
        if-no-files-found: warn

    - name: Upload to GitHub Release
      if: success()
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        APK_FILE=$(find WoWonder -name "*.apk" -type f 2>/dev/null | head -1)
        if [ -z "$APK_FILE" ]; then
          echo "No APK found!"
          exit 1
        fi
        APK_DIR=$(dirname "$APK_FILE")
        RENAMED="$APK_DIR/studios_nt_pt.apk"
        cp "$APK_FILE" "$RENAMED"
        echo "APK: studios_nt_pt.apk ($(stat -c%s "$RENAMED") bytes)"

        TAG="v$(date +%s)"
        gh release create "$TAG" \
          "$RENAMED" \
          --title "Timeline APK $(date +%Y-%m-%d) #${{ github.run_number }}" \
          --notes "Debug build $(git rev-parse --short HEAD)" \
          --target "${{ github.sha }}" 2>&1
        echo "RELEASE_TAG=$TAG" >> $GITHUB_ENV

  # ─── Build AAB (Release, signed) ───
  build-aab:
    name: Build AAB (Release)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'microsoft'
        java-version: '17'

    - name: Install standalone .NET 8 SDK
      run: |
        wget -q https://dotnetcli.azureedge.net/dotnet/Sdk/8.0.422/dotnet-sdk-8.0.422-linux-x64.tar.gz -O /tmp/dotnet8.tar.gz
        mkdir -p /opt/dotnet8
        tar -xzf /tmp/dotnet8.tar.gz -C /opt/dotnet8
        echo "DOTNET_ROOT=/opt/dotnet8" >> $GITHUB_ENV
        echo "/opt/dotnet8" >> $GITHUB_PATH

    - name: Install Android workload for .NET 8
      run: |
        export DOTNET_ROOT=/opt/dotnet8
        export PATH=/opt/dotnet8:$PATH
        $DOTNET_ROOT/dotnet workload install android

    - name: Decode keystore
      env:
        KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE }}
      run: |
        echo "$KEYSTORE_B64" | base64 -d > /tmp/release.keystore
        echo "RELEASE_KEYSTORE_PATH=/tmp/release.keystore" >> $GITHUB_ENV

    - name: Build & Publish AAB (signed)
      env:
        RELEASE_KEYSTORE_PATH: /tmp/release.keystore
        RELEASE_KEYSTORE_PASS: ${{ secrets.RELEASE_KEYSTORE_PASS }}
        RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
      run: |
        export DOTNET_ROOT=/opt/dotnet8
        export PATH=/opt/dotnet8:$PATH
        cd WoWonder
        dotnet publish WoWonder.csproj \
          -c Release \
          -f net8.0-android \
          -r android-arm64 \
          --self-contained \
          -p:AndroidPackageFormat=aab \
          -p:DebugType=none \
          -p:DebugSymbols=false \
          -p:AndroidKeyStore=true \
          -p:AndroidSigningKeyStore=/tmp/release.keystore \
          -p:AndroidSigningStorePass="$RELEASE_KEYSTORE_PASS" \
          -p:AndroidSigningKeyPass="$RELEASE_KEYSTORE_PASS" \
          -p:AndroidSigningKeyAlias="$RELEASE_KEY_ALIAS" \
          -p:AndroidSigningKeyAlg=RSA \
          2>&1 | tee build-aab.log
        exit_code=${PIPESTATUS[0]}
        if [ $exit_code -ne 0 ]; then
          echo "=== Retrying with NU1202 suppression ===..."
          dotnet publish WoWonder.csproj \
            -c Release \
            -f net8.0-android \
            -r android-arm64 \
            --self-contained \
            -p:AndroidPackageFormat=aab \
            -p:DebugType=none \
            -p:DebugSymbols=false \
            -p:AndroidKeyStore=true \
            -p:AndroidSigningKeyStore=/tmp/release.keystore \
            -p:AndroidSigningStorePass="$RELEASE_KEYSTORE_PASS" \
            -p:AndroidSigningKeyPass="$RELEASE_KEYSTORE_PASS" \
            -p:AndroidSigningKeyAlias="$RELEASE_KEY_ALIAS" \
            -p:AndroidSigningKeyAlg=RSA \
            -p:NoWarn=NU1202 \
            -p:CheckEolTargetFramework=false 2>&1 | tee -a build-aab.log
          exit ${PIPESTATUS[0]}
        fi
        exit $exit_code

    - name: Also build signed APK (Release)
      env:
        RELEASE_KEYSTORE_PATH: /tmp/release.keystore
        RELEASE_KEYSTORE_PASS: ${{ secrets.RELEASE_KEYSTORE_PASS }}
        RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
      run: |
        export DOTNET_ROOT=/opt/dotnet8
        export PATH=/opt/dotnet8:$PATH
        cd WoWonder
        dotnet publish WoWonder.csproj \
          -c Release \
          -f net8.0-android \
          -r android-arm64 \
          --self-contained \
          -p:AndroidPackageFormat=apk \
          -p:DebugType=none \
          -p:DebugSymbols=false \
          -p:AndroidKeyStore=true \
          -p:AndroidSigningKeyStore=/tmp/release.keystore \
          -p:AndroidSigningStorePass="$RELEASE_KEYSTORE_PASS" \
          -p:AndroidSigningKeyPass="$RELEASE_KEYSTORE_PASS" \
          -p:AndroidSigningKeyAlias="$RELEASE_KEY_ALIAS" \
          -p:AndroidSigningKeyAlg=RSA \
          -p:NoWarn=NU1202 \
          -p:CheckEolTargetFramework=false 2>&1 | tee build-apk-release.log

    - name: Find AAB
      run: |
        find WoWonder -name "*.aab" -type f 2>/dev/null | head -10
        find WoWonder/bin -type f -name "*.aab" 2>/dev/null | head -10
        find WoWonder -name "*unsigned*" -type f 2>/dev/null | head -5

    - name: Upload AAB (signed)
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: studios-nt-aab
        path: |
          WoWonder/bin/Release/**/*.aab
          WoWonder/**/*.aab
        retention-days: 90
        if-no-files-found: error

    - name: Upload AAB to Release
      if: success()
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        AAB_FILE=$(find WoWonder -name "*.aab" -type f 2>/dev/null | head -1)
        if [ -z "$AAB_FILE" ]; then
          echo "No AAB found!"
          exit 1
        fi
        # Upload to same release as APK job, or create its own
        TAG="aab-v$(date +%s)"
        gh release create "$TAG" \
          "$AAB_FILE" \
          --title "Timeline AAB $(date +%Y-%m-%d) #${{ github.run_number }}" \
          --notes "Release build $(git rev-parse --short HEAD) — assinado e pronto para Play Store" \
          --target "${{ github.sha }}" 2>&1
        echo "AAB_TAG=$TAG" >> $GITHUB_ENV

    - name: Upload signed APK to artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: timeline-apk-release
        path: |
          WoWonder/bin/Release/**/*.apk
          WoWonder/**/com.wowondertimeline*.apk
          WoWonder/**/studios_nt_pt.apk
        retention-days: 30
        if-no-files-found: warn

    - name: Upload signed APK to Release
      if: success()
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        APK_FILE=$(find WoWonder -name "*.apk" -type f -path "*/Release/*" 2>/dev/null | head -1)
        if [ -z "$APK_FILE" ]; then
          echo "No signed APK found in Release path!"
          find WoWonder/bin -name "*.apk" -type f 2>/dev/null
          exit 0
        fi
        echo "Found signed APK: $APK_FILE"
        TAG="apk-release-v$(date +%s)"
        gh release create "$TAG" \
          "$APK_FILE" \
          --title "Timeline APK Release $(date +%Y-%m-%d) #${{ github.run_number }}" \
          --notes "Release build $(git rev-parse --short HEAD) — assinado e pronto para instalar" \
          --target "${{ github.sha }}" 2>&1
        echo "APK_RELEASE_TAG=$TAG" >> $GITHUB_ENV
